name: CI

on:
  push:
    branches: ["**"]
    tags: ["*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  SOLUTION_PATH: QaaS.Mocker.sln
  PROJECT_TO_PACK: QaaS.Mocker/QaaS.Mocker.csproj
  PACKAGE_OUTPUT_DIRECTORY: ${{ github.workspace }}\BuildOutput

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate package metadata
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        run: |
          [xml]$project = Get-Content "${{ env.PROJECT_TO_PACK }}"
          $propertyGroups = @($project.Project.PropertyGroup)

          function Get-PropertyValue([string]$name) {
            foreach ($group in $propertyGroups) {
              $value = $group.$name
              if ($null -ne $value -and "$value".Trim() -ne "") {
                return "$value".Trim()
              }
            }
            return ""
          }

          $packageReadmeFile = Get-PropertyValue "PackageReadmeFile"
          if ([string]::IsNullOrWhiteSpace($packageReadmeFile)) {
            throw "PackageReadmeFile is required for packages pushed by CI."
          }

          $includeSymbols = Get-PropertyValue "IncludeSymbols"
          if ($includeSymbols.ToLowerInvariant() -ne "true") {
            throw "IncludeSymbols must be true for packages pushed by CI."
          }

          $symbolPackageFormat = Get-PropertyValue "SymbolPackageFormat"
          if ($symbolPackageFormat.ToLowerInvariant() -ne "snupkg") {
            throw "SymbolPackageFormat must be snupkg for packages pushed by CI."
          }

      - name: Restore packages
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build solution (no warnings)
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration ${{ env.CONFIGURATION }} -warnaserror

      - name: Test solution
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration ${{ env.CONFIGURATION }} --no-build --maxcpucount

      - name: Get Version
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        uses: battila7/get-version-action@v2

      - name: Validate SemVer tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version-without-v }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)\.[0-9]+)?$ ]]; then
            echo "Error: '$VERSION' is not a valid version."
            exit 1
          fi

      - name: Pack QaaS.Mocker
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          dotnet pack ${{ env.PROJECT_TO_PACK }} `
            --no-restore `
            --configuration ${{ env.CONFIGURATION }} `
            --include-symbols `
            -p:PackageVersion=${{ steps.version.outputs.version-without-v }} `
            --output ${{ env.PACKAGE_OUTPUT_DIRECTORY }}

      - name: Validate package artifacts
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        run: |
          $nupkg = Get-ChildItem "${{ env.PACKAGE_OUTPUT_DIRECTORY }}\QaaS.Mocker.*.nupkg" |
            Where-Object { $_.Name -match "^QaaS\.Mocker\.[0-9]" } |
            Select-Object -First 1
          if ($null -eq $nupkg) {
            throw "Expected QaaS.Mocker nupkg was not produced."
          }

          $snupkgName = [System.IO.Path]::GetFileNameWithoutExtension($nupkg.Name) + ".snupkg"
          $snupkgPath = Join-Path "${{ env.PACKAGE_OUTPUT_DIRECTORY }}" $snupkgName
          if (-not (Test-Path $snupkgPath)) {
            throw "Expected symbol package '$snupkgName' was not produced."
          }

      - name: Push QaaS.Mocker to NuGet
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        run: |
          $packages = Get-ChildItem "${{ env.PACKAGE_OUTPUT_DIRECTORY }}\QaaS.Mocker.*.nupkg"
          foreach ($package in $packages) {
            if ($package.Name -match "^QaaS\.Mocker\.[0-9]") {
              dotnet nuget push $package.FullName -k ${{ secrets.NUGET_AUTH_TOKEN }} -s https://api.nuget.org/v3/index.json
            }
          }
