Controller:
  ServerName: socket-runner-mocker-integration-tests
  Redis:
    AbortOnConnectFail: false
    Host: bigger:6379

Server:
  Type: Socket
  Socket:
    
    EndPoints:
      - Port: ${variables:socket:broadcastPort}
        ProtocolType: ${variables:socket:protocol}
        BufferSizeBytes: ${variables:socket:commBuffer}
        NagleAlgorithm: ${variables:socket:server:nagle}
        TimeoutMs: 5000
        Action:
          Name: BroadcastSamples
          Method: Broadcast
          DataSourceName: Samples

      - Port: ${variables:socket:collectPort}
        ProtocolType: ${variables:socket:protocol}
        BufferSizeBytes: ${variables:socket:commBuffer}
        NagleAlgorithm: ${variables:socket:server:nagle}
        TimeoutMs: 5000
        Action:
          Name: CollectSamples
          Method: Collect

