DataSources:
  - Name: FromFileSystemTestMockerServerExample
    Generator: FromFileSystem
    GeneratorSpecificConfiguration:
      DataArrangeOrder: AsciiAsc
      FileSystem:
        Path: Data
  - Name: Samples
    Generator: FromFileSystem
    GeneratorSpecificConfiguration:
      DataArrangeOrder: AsciiAsc
      FileSystem:
        Path: SocketData

